<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestSBD - Депозит и Вывод</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .status-item {
            margin: 8px 0;
            font-size: 14px;
            color: #333;
        }

        .status-item strong {
            color: #667eea;
        }

        .wallet-info {
            background: #e8f4f8;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            word-break: break-all;
            color: #555;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .btn-deposit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-deposit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-withdraw {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-withdraw:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-connect {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            width: 100%;
            margin-bottom: 20px;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .admin-badge {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 TestSBD</h1>
        <p class="subtitle">Депозит и Вывод средств</p>

        <button id="connectBtn" class="btn-connect">🔗 Подключить MetaMask</button>

        <div class="wallet-info" id="walletInfo" style="display: none;">
            <strong>Кошелёк:</strong> <span id="walletAddress"></span>
            <div id="adminBadge"></div>
        </div>

        <div class="status" id="statusBox" style="display: none;">
            <div class="status-item">
                <strong>Ваш баланс в контракте:</strong> <span id="userBalance">0</span> ETH
            </div>
            <div class="status-item">
                <strong>Баланс контракта:</strong> <span id="contractBalance">0</span> ETH
            </div>
        </div>

        <div id="mainContent" style="display: none;">
            <div class="input-group">
                <label for="depositAmount">💰 Сумма для депозита (ETH)</label>
                <input type="number" id="depositAmount" placeholder="0.01" step="0.001" min="0">
            </div>

            <div class="input-group">
                <label for="withdrawAmount">💸 Сумма для вывода (ETH)</label>
                <input type="number" id="withdrawAmount" placeholder="0.01" step="0.001" min="0">
            </div>

            <div class="button-group">
                <button class="btn-deposit" onclick="deposit()">📥 Депозит</button>
                <button class="btn-withdraw" onclick="withdraw()">📤 Вывод</button>
            </div>

            <button class="btn-connect" onclick="updateBalances()" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);">
                🔄 Обновить балансы
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #667eea;">Обработка транзакции...</p>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
    <script>
        // ВАЖНО: Замените этот адрес на адрес вашего задеплоенного контракта!
        const CONTRACT_ADDRESS = "0xВАШ_АДРЕС_КОНТРАКТА_ЗДЕСЬ";
        
        // ABI контракта (минимальный набор функций)
        const CONTRACT_ABI = [
            "function deposit() public payable",
            "function withdraw(uint256 _amount) public",
            "function getMyBalance() public view returns (uint256)",
            "function getContractBalance() public view returns (uint256)",
            "function ADMIN() public view returns (address)",
            "event Deposit(address indexed user, uint256 amount)",
            "event Withdraw(address indexed user, uint256 amount)"
        ];

        const ADMIN_ADDRESS = "0xC132Eb2430236ce43E7398caBccd449244586555";

        let provider;
        let signer;
        let contract;
        let userAddress;

        // Подключение к MetaMask
        async function connectWallet() {
            try {
                if (typeof window.ethereum === 'undefined') {
                    showMessage('Пожалуйста, установите MetaMask!', 'error');
                    return;
                }

                // Запрос подключения к MetaMask
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();
                
                // Подключение к контракту
                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

                // Проверка сети (Abstract Chain)
                const network = await provider.getNetwork();
                console.log('Подключена сеть:', network);

                // Обновление UI
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('walletInfo').style.display = 'block';
                document.getElementById('statusBox').style.display = 'block';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('walletAddress').textContent = 
                    userAddress.substring(0, 6) + '...' + userAddress.substring(38);

                // Проверка, является ли пользователь админом
                if (userAddress.toLowerCase() === ADMIN_ADDRESS.toLowerCase()) {
                    document.getElementById('adminBadge').innerHTML = 
                        '<span class="admin-badge">👑 Администратор</span>';
                }

                await updateBalances();
                showMessage('Кошелёк успешно подключен!', 'success');
            } catch (error) {
                console.error('Ошибка подключения:', error);
                showMessage('Ошибка подключения: ' + error.message, 'error');
            }
        }

        // Обновление балансов
        async function updateBalances() {
            try {
                const userBalance = await contract.getMyBalance();
                const contractBalance = await contract.getContractBalance();

                document.getElementById('userBalance').textContent = 
                    ethers.utils.formatEther(userBalance);
                document.getElementById('contractBalance').textContent = 
                    ethers.utils.formatEther(contractBalance);
            } catch (error) {
                console.error('Ошибка обновления балансов:', error);
            }
        }

        // Депозит
        async function deposit() {
            const amount = document.getElementById('depositAmount').value;
            
            if (!amount || amount <= 0) {
                showMessage('Введите корректную сумму для депозита', 'error');
                return;
            }

            try {
                showLoading(true);
                const tx = await contract.deposit({
                    value: ethers.utils.parseEther(amount)
                });
                
                showMessage('Транзакция отправлена. Ожидание подтверждения...', 'success');
                await tx.wait();
                
                showLoading(false);
                showMessage(`Успешно внесено ${amount} ETH!`, 'success');
                document.getElementById('depositAmount').value = '';
                await updateBalances();
            } catch (error) {
                showLoading(false);
                console.error('Ошибка депозита:', error);
                showMessage('Ошибка депозита: ' + error.message, 'error');
            }
        }

        // Вывод
        async function withdraw() {
            const amount = document.getElementById('withdrawAmount').value;
            
            if (!amount || amount <= 0) {
                showMessage('Введите корректную сумму для вывода', 'error');
                return;
            }

            try {
                showLoading(true);
                const tx = await contract.withdraw(ethers.utils.parseEther(amount));
                
                showMessage('Транзакция отправлена. Ожидание подтверждения...', 'success');
                await tx.wait();
                
                showLoading(false);
                showMessage(`Успешно выведено ${amount} ETH!`, 'success');
                document.getElementById('withdrawAmount').value = '';
                await updateBalances();
            } catch (error) {
                showLoading(false);
                console.error('Ошибка вывода:', error);
                showMessage('Ошибка вывода: ' + error.message, 'error');
            }
        }

        // Показать сообщение
        function showMessage(text, type) {
            const messageBox = document.getElementById('message');
            messageBox.textContent = text;
            messageBox.className = 'message ' + type + ' show';
            
            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 5000);
        }

        // Показать/скрыть загрузку
        function showLoading(show) {
            document.getElementById('loading').className = show ? 'loading show' : 'loading';
        }

        // Обработчик кнопки подключения
        document.getElementById('connectBtn').addEventListener('click', connectWallet);

        // Автоматическое подключение при смене аккаунта
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', function (accounts) {
                if (accounts.length > 0) {
                    window.location.reload();
                }
            });

            window.ethereum.on('chainChanged', function () {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
